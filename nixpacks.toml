[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "gnumake", "gcc", "cmake", "python3"]

[phases.build]
cmds = [
  "pnpm install",
]

# NOTE: QVAC models are downloaded automatically on first use.
# For production, pre-download models during build to avoid startup timeouts:
#   "npx tsx apps/bot/scripts/download-qvac-models.ts"
# Models total ~3-5GB. Ensure your deployment target has enough disk space.

[start]
cmd = "pnpm db:migrate && pnpm exec tsx apps/bot/src/index.ts"
